<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裁斷應用程式網站 2.0 (CUTTING Application Index 2.0)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* ---------------------------------- */
        /* 1. 基本設定與佈局 */
        /* ---------------------------------- */

        body {
            background-color: #A9A9A9; 
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 30px 10px;
            margin: 0;
            min-height: 100vh;
            position: relative; 
        }

        .header-container {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 720px;
        }

        h1 {
            color: #444;
            margin: 0;
            font-size: 30px; 
        }
        .subheader {
            color: #666;
            font-size: 18px;
            margin-top: 5px;
        }

        /* ---------------------------------- */
        /* 1.1 右上角清除暫存按鈕樣式 */
        /* ---------------------------------- */
        #clear-cache-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #333;
            border: 1px solid #777;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(2px); /* 磨砂玻璃效果 */
        }

        #clear-cache-btn:hover {
            background-color: #f44336;
            color: white;
            border-color: #d32f2f;
        }
        
        /* 桌面版網格設置 */
        .button-grid {
            display: flex;
            flex-wrap: wrap; 
            width: 720px; 
            gap: 60px; 
            justify-content: center;
            margin-bottom: 40px; 
        }

        /* ---------------------------------- */
        /* 2. 主頁按鈕 (連結) 的通用樣式 */
        /* ---------------------------------- */

        .btn-style {
            width: 200px;
            height: 200px;
            text-decoration: none; 
            color: #fff; 
            border-radius: 20px; 
            cursor: pointer;
            box-sizing: border-box; 
            position: relative; 
            overflow: hidden; 
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            /* 橘色高光樣式 */
            box-shadow: 0 4px 0 #D46900; 
            transition: transform 0.1s, box-shadow 0.1s;
            background: linear-gradient(to bottom, #FF8C00, #FF7F00); 
        }

        .btn-style:hover {
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #D46900;
        }

        .btn-style:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #D46900;
        }

        .btn-style::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            /* 光澤效果 */
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.5) 0%,
                rgba(255, 255, 255, 0.0) 50%,
                rgba(255, 255, 255, 0.1) 100%
            );
            pointer-events: none;
        }

        /* ---------------------------------- */
        /* 3. 按鈕內容樣式 (網址按鈕) */
        /* ---------------------------------- */
        
        .btn-icon {
            font-size: 80px; 
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2); 
        }
        
        .btn-text {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.2;
            padding: 0 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4); 
        }
        
        /* ---------------------------------- */
        /* 4. 設定按鈕樣式 (右下角齒輪圖標) */
        /* ---------------------------------- */
        #settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px; 
            height: 50px;
            border-radius: 50%; 
            background-color: #555;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 100;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        #settings-btn i {
            font-size: 24px; 
        }
        
        /* ---------------------------------- */
        /* 5. 手機模式優化 (MEDIA QUERY - 主頁) */
        /* ---------------------------------- */
        @media (max-width: 768px) {
            
            .button-grid {
                width: 100%; 
                max-width: 480px; 
                gap: 20px; 
                padding: 0 10px;
            }

            .btn-style {
                width: calc(50% - 10px); 
                height: 140px; 
                border-radius: 15px; 
            }

            .btn-icon {
                font-size: 50px; 
            }

            .btn-text {
                font-size: 14px;
            }

            /* 手機版清除按鈕位置微調 */
            #clear-cache-btn {
                top: 10px;
                right: 10px;
                font-size: 10px;
                padding: 5px 8px;
            }
        }
        
        /* ---------------------------------- */
        /* 6. Modal / 設定列表 / 表單 樣式 */
        /* ---------------------------------- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 101; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow-y: auto; 
            background-color: rgba(0,0,0,0.6); 
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto; 
            padding: 30px;
            border: 1px solid #888;
            width: 90%; 
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .new-btn-form {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
            align-items: end;
        }
        
        #save-and-return-btn {
            grid-column: 1 / 3; 
            padding: 12px 10px;
            background-color: #007bff; 
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            font-weight: bold;
        }
        
        .new-btn-form button[type="submit"] {
            grid-column: 1 / 3; 
            padding: 12px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-right: 0 !important;
        }

        .new-btn-form label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 3px;
        }

        .new-btn-form input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .setting-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            flex-wrap: wrap; 
        }
        
        .setting-item input[type="text"] {
            flex-grow: 1;
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-width: 100px; 
        }

        .setting-item .delete-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .modal-content {
                margin: 0;
                width: 100%;
                min-height: 100vh;
                border-radius: 0;
            }
            .setting-item .delete-btn {
                width: 80%;
                margin: 5px auto 0 auto;
                display: block;
            }
            .new-btn-form button[type="submit"] {
                width: 80%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <button id="clear-cache-btn" onclick="clearDataAndReload()">
        <i class="fas fa-trash-alt"></i> 清除暫存並更新
    </button>

    <div class="header-container">
        <h1>🏢 裁斷應用程式索引 2.0</h1>
        <div class="subheader">CUTTING Application Index 2.0</div>
    </div>

    <div class="button-grid" id="button-grid"></div>
    
    <button id="settings-btn" onclick="authenticateAndOpenModal()">
        <i class="fas fa-cog"></i>
    </button>
    
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>新增專案網址</h2> 

            <form id="new-btn-form" class="new-btn-form">
                <div>
                    <label for="new-en-name">英文名稱</label>
                    <input type="text" id="new-en-name" placeholder="Machine-NG" required>
                </div>
                <div>
                    <label for="new-cn-name">中文名稱</label>
                    <input type="text" id="new-cn-name" placeholder="機械管理 (選填)">
                </div>
                <div style="grid-column: 1 / 3;">
                    <label for="new-url">網址連結</label>
                    <input type="text" id="new-url" placeholder="https://..." required>
                </div>
                <button type="submit">新增</button>
            </form>
            
            <hr>

            <h3>管理現有按鈕</h3>
            <div id="settings-list"></div>
            
            <p style="margin-top: 15px; color: #666; font-size: 12px;">提示：直接在列表中修改名稱或網址會自動儲存。</p>
            
            <button id="save-and-return-btn" onclick="savePasswordAndClose()">
                <i class="fas fa-save"></i> 儲存並返回 (自動記錄密碼)
            </button>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = "1429"; 
        
        const defaultButtons = [
            { en: "Machine-NG CT", cn: "機械故障資訊", url: "https://dereklin1429.github.io/Machine-NG-CT/", icon: "fa-arrow-right" },
            { en: "5S Audit CT", cn: "裁斷 5S 查核", url: "https://dereklin1429.github.io/5S-audit-CT/", icon: "fa-arrow-circle-right" },
            { en: "Repair Record CT", cn: "機械維修紀錄", url: "https://dereklin1429.github.io", icon: "fa-play" },
            { en: "MC Maintenance CT", cn: "設備保養查核", url: "https://dereklin1429.github.io/Maintenance-CT/", icon: "fa-angle-double-right" },
            { en: "CUTTING Inventory", cn: "裁斷庫存盤點", url: "https://dereklin1429.github.io/derekctInventory03/", icon: "fa-location-arrow" },
            { en: "WET TEST", cn: "WET試車紀錄", url: "https://dereklin1429.github.io/MCWETTEST01/", icon: "fa-list-check" },
            { en: "SCRAP DATA", cn: "材料報廢紀錄", url: "https://dereklin1429.github.io/Monthly-Scrap-Data-Statistics-V3.0/", icon: "fa-book" },
            { en: "SPC RM Info", cn: "材料規格資訊", url: "https://dereklin1429.github.io/Spec-and-raw-material-searcher/", icon: "fa-book" }           
        ];

        let appButtons = [];
        const STORAGE_KEY = 'departmentalAppButtonsV2';
        const STORED_PASSWORD_KEY = 'settingsStoredPassword';

        const buttonGrid = document.getElementById('button-grid');
        const newBtnForm = document.getElementById('new-btn-form');
        const settingsModal = document.getElementById('settingsModal');

        // 1. 初始化
        function loadButtons() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                appButtons = JSON.parse(saved);
            } else {
                appButtons = [...defaultButtons];
                saveButtons();
            }
            renderMainButtons();
        }

        // 2. 儲存
        function saveButtons() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appButtons));
        }

        // 3. 渲染主頁
        function renderMainButtons() {
            buttonGrid.innerHTML = ''; 
            appButtons.forEach(btn => {
                let nameToDisplay = btn.en;
                if (btn.cn && btn.cn.trim() !== '') {
                    nameToDisplay += `<br>(${btn.cn.trim()})`;
                }
                const link = document.createElement('a');
                link.className = 'btn-style'; 
                link.href = btn.url;
                link.target = '_blank';
                link.innerHTML = `<i class="fas ${btn.icon} btn-icon"></i><span class="btn-text">${nameToDisplay}</span>`;
                buttonGrid.appendChild(link);
            });
        }

        // 新增功能：清除資料並重新整理
        function clearDataAndReload() {
            if (confirm("確定要清除所有自訂按鈕暫存並還原為預設設定嗎？\n(此動作無法復原)")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload(); 
            }
        }

        function renderSettingsList() {
            const settingsList = document.getElementById('settings-list');
            settingsList.innerHTML = '';
            appButtons.forEach((btn, index) => {
                const item = document.createElement('div');
                item.className = 'setting-item';
                item.innerHTML = `
                    <input type="text" value="${btn.en}" onchange="updateButton(${index}, 'en', this.value)" placeholder="英文名稱">
                    <input type="text" value="${btn.cn || ''}" onchange="updateButton(${index}, 'cn', this.value)" placeholder="中文名稱">
                    <input type="text" value="${btn.url}" onchange="updateButton(${index}, 'url', this.value)" placeholder="網址連結">
                    <button class="delete-btn" onclick="deleteButton(${index})">刪除</button>
                `;
                settingsList.appendChild(item);
            });
        }

        newBtnForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const enName = document.getElementById('new-en-name').value.trim();
            const cnName = document.getElementById('new-cn-name').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const randomIcons = ["fa-long-arrow-alt-right", "fa-arrow-right", "fa-play", "fa-rocket"];
            const icon = randomIcons[Math.floor(Math.random() * randomIcons.length)];
            appButtons.push({ en: enName, cn: cnName, url: url, icon });
            saveButtons();
            renderMainButtons();
            renderSettingsList();
            newBtnForm.reset();
        });

        function deleteButton(index) {
            if (confirm(`確定要刪除嗎？`)) {
                appButtons.splice(index, 1);
                saveButtons();
                renderMainButtons();
                renderSettingsList();
            }
        }

        function updateButton(index, field, value) {
            appButtons[index][field] = value.trim();
            saveButtons();
            renderMainButtons();
        }

        function openModal() {
            renderSettingsList(); 
            settingsModal.style.display = "block";
            if (window.innerWidth <= 768) settingsModal.querySelector('.modal-content').scrollTop = 0;
        }

        function closeModal() { settingsModal.style.display = "none"; }

        function savePasswordAndClose() {
            saveButtons(); 
            if (confirm("是否要儲存密碼於此瀏覽器以自動登入？")) {
                localStorage.setItem(STORED_PASSWORD_KEY, DEFAULT_PASSWORD); 
            } else {
                localStorage.removeItem(STORED_PASSWORD_KEY);
            }
            closeModal();
        }

        function authenticateAndOpenModal() {
            if (localStorage.getItem(STORED_PASSWORD_KEY) === DEFAULT_PASSWORD) {
                openModal();
            } else {
                const password = prompt("請輸入管理密碼：");
                if (password === DEFAULT_PASSWORD) openModal();
                else if (password !== null) alert("密碼錯誤！");
            }
        }

        window.onclick = function(event) { if (event.target == settingsModal) closeModal(); }

        loadButtons();
    </script>

</body>
</html>
